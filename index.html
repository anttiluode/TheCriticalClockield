<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clockfield WebGL Engine</title>
<style>
  body { margin:0; background:#060810; overflow:hidden; }
  canvas { display:block; }
  #ui {
    position:absolute; left:10px; top:10px;
    background:#0c1220; padding:10px; border-radius:10px;
    color:#fff; font-family:monospace; width:260px;
  }
  input { width:100%; }
</style>
</head>
<body>
<div id="ui">
  <div>Noise <input id="sigma" type="range" min="0" max="2" step="0.001" value="0.5"></div>
  <div>Repulsion <input id="rep" type="range" min="0" max="2" step="0.001" value="0.5"></div>
  <div>Attraction <input id="att" type="range" min="0" max="2" step="0.001" value="0.8"></div>
  <div>Hub <input id="hub" type="range" min="0" max="3" step="0.001" value="1.5"></div>
  <div id="stats"></div>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
resize();
window.addEventListener("resize", resize);

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

const N = 600; // reduced for browser stability
let pos = new Float32Array(N*2);
let vel = new Float32Array(N*2);
let beta = new Float32Array(N);
let frozen = new Uint8Array(N);

for(let i=0;i<N;i++){
  pos[i*2] = (Math.random()-0.5)*10;
  pos[i*2+1] = (Math.random()-0.5)*10;
  beta[i] = Math.random();
}

function step(){
  // Nonlinear slider mapping for fine low-end control
  const sigma = Math.pow(+sigmaEl.value, 2.2);
  const rep   = Math.pow(+repEl.value,   2.2);
  const att   = Math.pow(+attEl.value,   2.2);
  const hub   = Math.pow(+hubEl.value,   2.2);

  for(let i=0;i<N;i++){
    let noise = (Math.random()*2-1)*sigma;
    beta[i] += noise*noise*0.2;
    beta[i] *= 0.95;
    frozen[i] = beta[i] > 0.465 ? 1 : 0;
  }

  for(let i=0;i<N;i++){
    let fx=0, fy=0;
    for(let j=0;j<N;j++){
      if(i===j) continue;
      let dx = pos[i*2]-pos[j*2];
      let dy = pos[i*2+1]-pos[j*2+1];
      let d2 = dx*dx+dy*dy+0.1;

      fx += dx/d2 * rep;
      fy += dy/d2 * rep;

      let dist = Math.sqrt(d2);
      let reach = frozen[i]||frozen[j] ? 1+hub*2 : 1;
      if(dist < reach){
        fx -= dx*att*0.02;
        fy -= dy*att*0.02;
      }
    }

    fx -= pos[i*2]*0.05;
    fy -= pos[i*2+1]*0.05;

    let mass = frozen[i] ? 50 : 1;
    vel[i*2] += fx/mass;
    vel[i*2+1] += fy/mass;

    vel[i*2] *= 0.8;
    vel[i*2+1] *= 0.8;
  }

  for(let i=0;i<N;i++){
    pos[i*2] += vel[i*2]*0.05;
    pos[i*2+1] += vel[i*2+1]*0.05;
  }
}

function draw(){
  ctx.fillStyle = "#060810";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let frozenCount=0;

  for(let i=0;i<N;i++){
    if(frozen[i]) frozenCount++;

    let x = pos[i*2]*40 + canvas.width/2;
    let y = pos[i*2+1]*40 + canvas.height/2;

    ctx.beginPath();
    ctx.arc(x,y,frozen[i]?4:2,0,Math.PI*2);
    ctx.fillStyle = frozen[i]?"#fff":"#ff6644";
    ctx.fill();
  }

  stats.textContent = `Nodes: ${N}\nFrozen: ${(frozenCount/N*100).toFixed(1)}%`;
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

const sigmaEl = document.getElementById("sigma");
const repEl = document.getElementById("rep");
const attEl = document.getElementById("att");
const hubEl = document.getElementById("hub");
const stats = document.getElementById("stats");

loop();
</script>
</body>
</html>
